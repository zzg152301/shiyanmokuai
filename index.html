<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>涡轮额度诊断工具</title>
<script src="https://cdn.jsdelivr.net/npm/ethers@6.7.1/dist/ethers.umd.min.js"></script>
<style>
  :root{
    --bg:#0a0c12; --panel:#12151f; --panel2:#171b29; --border:#262b3d;
    --text:#e6e8f0; --muted:#7a8099; --accent:#6c5ce7; --accent2:#00d9a5;
    --warn:#ffb454; --danger:#ff5c7a; --mono:'JetBrains Mono',monospace;
  }
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--text);font-family:'Space Grotesk',sans-serif;padding:20px 16px 60px;}
  .wrap{max-width:760px;margin:0 auto;}
  h1{font-size:1.1rem;margin:0 0 4px;}
  .sub{font-size:0.78rem;color:var(--muted);margin-bottom:18px;line-height:1.6;}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:18px;margin-bottom:14px;}
  .btn{border:none;border-radius:10px;padding:11px 18px;font-weight:600;font-size:0.85rem;cursor:pointer;background:var(--accent);color:#fff;width:100%;}
  .btn:disabled{background:#3a3a4a;color:#888;}
  .field{margin-bottom:10px;}
  .field input{width:100%;background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:9px 10px;color:var(--text);font-family:var(--mono);font-size:0.82rem;}
  .field label{display:block;font-size:0.7rem;color:var(--muted);margin-bottom:4px;}
  .hint{font-size:0.7rem;color:var(--warn);background:rgba(255,180,84,.08);border:1px solid rgba(255,180,84,.25);border-radius:8px;padding:8px 10px;margin-bottom:12px;line-height:1.5;}
  .result-row{
    display:flex;justify-content:space-between;gap:10px;align-items:center;
    padding:9px 12px;border-radius:8px;background:var(--panel2);border:1px solid var(--border);
    font-family:var(--mono);font-size:0.76rem;margin-bottom:6px;
  }
  .result-row.hit{border-color:rgba(0,217,165,.5);background:rgba(0,217,165,.08);}
  .result-row .name{color:var(--muted);}
  .result-row .val{color:var(--text);font-weight:600;}
  .result-row.hit .val{color:var(--accent2);}
  .log-block{
    background:var(--panel2);border:1px solid var(--border);border-radius:8px;padding:10px;
    font-family:var(--mono);font-size:0.7rem;white-space:pre-wrap;word-break:break-all;color:var(--muted);
    max-height:340px;overflow-y:auto;
  }
  .status{font-family:var(--mono);font-size:0.78rem;color:var(--muted);margin:10px 0;}
  .status.ok{color:var(--accent2);}
  .status.err{color:var(--danger);}
  .walletInfo{font-family:var(--mono);font-size:0.78rem;color:var(--accent2);margin-bottom:10px;}
</style>
</head>
<body>
<div class="wrap">
  <h1>🔧 涡轮额度诊断工具</h1>
  <div class="sub">先读标准 LGNS 余额，再读涡轮合约自定义字段。只读，不发交易。</div>

  <div class="card">
    <div class="walletInfo" id="walletInfo">未连接</div>
    <button class="btn" id="connBtn" onclick="connect()">连接钱包</button>
  </div>

  <div class="card">
    <div class="field">
      <label>诊断地址</label>
      <input type="text" id="targetAddr" placeholder="0x..." />
    </div>
    <div class="field">
      <label>扫描回溯区块数</label>
      <input type="text" id="scanBlocks" value="500000" />
    </div>
    <button class="btn" id="runBtn" onclick="runDiagnostics()" disabled>开始诊断</button>
    <div class="status" id="status">— 等待连接钱包 —</div>
  </div>

  <div class="card">
    <div style="font-weight:600;font-size:0.88rem;margin-bottom:8px;">① 标准 LGNS 余额</div>
    <div id="balanceResults"></div>
  </div>

  <div class="card">
    <div style="font-weight:600;font-size:0.88rem;margin-bottom:8px;">② 涡轮合约函数试探</div>
    <div id="fnResults"></div>
  </div>

  <div class="card">
    <div style="font-weight:600;font-size:0.88rem;margin-bottom:8px;">③ 原始事件日志</div>
    <div class="log-block" id="logResults">— 还没有扫描 —</div>
  </div>
</div>

<script>
const TURBINE_ADDR = '0x07Ff4e06865de4934409Aa6eCea503b08Cc1C78d';
const LGNS_TOKEN = '0xeB51D9A39AD5EEF215dC0Bf39a8821ff804A0F01';
const LGNS_DECIMALS = 9;

const CANDIDATES = [
  'balanceOf',
  'silenceOf',
  'silenceBalance',
  'getSilenceBalance',
  'turbineBalance',
  'getTurbineBalance',
  'silentBalanceOf',
  'userSilence',
  'pendingSilence',
  'silenceAmount',
  'getSilenceAmount',
  'amountSilenced',
  'silencedAmount',
  'mySilence',
  'getMySilence',
  'userBalance',
  'getUserBalance',
  'availableSilence',
  'redeemableSilence',
  'claimableSilence',
  'lockedBalance',
  'getLockedBalance',
  'quotaOf',
  'getQuota',
  'remainingSilence',
  'getRemainingSilence'
];

let provider, signer, userAddr;

async function connect(){
  const p = window.okxwallet || window.ethereum || (window.tokenpocket && window.tokenpocket.ethereum) || (window.bitkeep && window.bitkeep.ethereum);
  if(!p){ alert('未检测到钱包插件，请在钱包内置浏览器中打开'); return; }
  try{
    provider = new ethers.BrowserProvider(p);
    await provider.send('eth_requestAccounts', []);
    try{ await p.request({method:'wallet_switchEthereumChain', params:[{chainId:'0x89'}]}); }catch(e){}
    provider = new ethers.BrowserProvider(p);
    signer = await provider.getSigner();
    userAddr = await signer.getAddress();
    document.getElementById('walletInfo').textContent = '已连接：' + userAddr;
    document.getElementById('targetAddr').value = userAddr;
    document.getElementById('connBtn').textContent = '已连接';
    document.getElementById('connBtn').disabled = true;
    document.getElementById('runBtn').disabled = false;
    setStatus('✅ 钱包已连接，可以开始诊断', 'ok');
  }catch(e){
    alert('连接失败：' + (e.reason || e.message));
  }
}

function setStatus(msg, cls){
  const el = document.getElementById('status');
  el.textContent = msg;
  el.classList.remove('ok','err');
  if(cls) el.classList.add(cls);
}

function clearBox(id){ document.getElementById(id).innerHTML = ''; }

function addRow(boxId, name, val, hit=false){
  const row = document.createElement('div');
  row.className = 'result-row' + (hit ? ' hit' : '');
  row.innerHTML = `<span class="name">${name}</span><span class="val">${val}</span>`;
  document.getElementById(boxId).appendChild(row);
}

async function readTokenBalance(token, target){
  const abi = [
    'function balanceOf(address owner) view returns (uint256)',
    'function decimals() view returns (uint8)',
    'function symbol() view returns (string)'
  ];
  const c = new ethers.Contract(token, abi, provider);
  const raw = await c.balanceOf(target);
  let dec = LGNS_DECIMALS;
  let sym = 'LGNS';
  try{ dec = Number(await c.decimals()); }catch(e){}
  try{ sym = await c.symbol(); }catch(e){}
  return {raw: raw.toString(), human: ethers.formatUnits(raw, dec), decimals: dec, symbol: sym};
}

async function tryFunctions(target){
  const results = [];
  for(const fnName of CANDIDATES){
    try{
      const abi = [`function ${fnName}(address) view returns (uint256)`];
      const c = new ethers.Contract(TURBINE_ADDR, abi, provider);
      const out = await c[fnName](target);
      results.push({fnName, ok:true, raw: out.toString(), human: ethers.formatUnits(out, LGNS_DECIMALS)});
    }catch(e){
      results.push({fnName, ok:false});
    }
    await new Promise(r => setTimeout(r, 30));
  }
  return results;
}

async function scanLogs(target){
  const currentBlock = await provider.getBlockNumber();
  const scanRange = parseInt(document.getElementById('scanBlocks').value.trim() || '500000');
  const fromBlock = Math.max(currentBlock - scanRange, 0);
  const topic = ethers.zeroPadValue(ethers.getAddress(target), 32);

  const q1 = provider.getLogs({address: TURBINE_ADDR, topics:[null, topic], fromBlock, toBlock:'latest'}).catch(()=>[]);
  const q2 = provider.getLogs({address: TURBINE_ADDR, topics:[null, null, topic], fromBlock, toBlock:'latest'}).catch(()=>[]);
  const q3 = provider.getLogs({address: TURBINE_ADDR, topics:[null, null, null, topic], fromBlock, toBlock:'latest'}).catch(()=>[]);
  const [a,b,c] = await Promise.all([q1,q2,q3]);

  const seen = new Set();
  const all = [...a,...b,...c].filter(x => {
    const k = x.transactionHash + '-' + x.logIndex;
    if(seen.has(k)) return false;
    seen.add(k);
    return true;
  }).sort((x,y)=>x.blockNumber-y.blockNumber);

  return {fromBlock, all};
}

async function runDiagnostics(){
  const target = document.getElementById('targetAddr').value.trim() || userAddr;
  if(!ethers.isAddress(target)){ setStatus('❌ 地址格式不对', 'err'); return; }

  document.getElementById('runBtn').disabled = true;
  clearBox('balanceResults');
  clearBox('fnResults');
  document.getElementById('logResults').textContent = '⏳ 扫描中...';

  setStatus('⏳ 读取标准 LGNS 余额...', '');
  try{
    const bal = await readTokenBalance(LGNS_TOKEN, target);
    addRow('balanceResults', `${bal.symbol} balanceOf`, `${bal.human} ${bal.symbol}`, true);
    addRow('balanceResults', 'raw', bal.raw, false);
    addRow('balanceResults', 'decimals', String(bal.decimals), false);
  }catch(e){
    addRow('balanceResults', 'LGNS balanceOf', '读取失败：请确认 LGNS 合约地址', false);
  }

  setStatus('⏳ 试探涡轮合约函数...', '');
  const hits = await tryFunctions(target);
  let hitCount = 0;
  hits.forEach(x => {
    if(x.ok){
      hitCount++;
      addRow('fnResults', x.fnName + '(address)', `✅ ${x.human} LGNS`, true);
    }else{
      addRow('fnResults', x.fnName + '(address)', '✗', false);
    }
  });

  setStatus('⏳ 扫描事件日志...', '');
  try{
    const res = await scanLogs(target);
    if(res.all.length === 0){
      document.getElementById('logResults').textContent =
        `最近 ${document.getElementById('scanBlocks').value.trim() || '500000'} 个区块未找到相关日志。\n建议：1) 增大扫描范围；2) 检查合约地址；3) 确认地址确实和涡轮合约有交互。`;
    }else{
      let lines = [`共找到 ${res.all.length} 条日志：\n`];
      res.all.forEach((log, i) => {
        lines.push(`#${i+1} Block ${log.blockNumber} Tx ${log.transactionHash}`);
        lines.push(`topic0: ${log.topics[0]}`);
        log.topics.slice(1).forEach((t, idx) => lines.push(`topic${idx+1}: ${t}`));
        lines.push(`data: ${log.data}\n`);
      });
      document.getElementById('logResults').textContent = lines.join('\n');
    }
  }catch(e){
    document.getElementById('logResults').textContent = '❌ 日志扫描失败：' + (e.reason || e.message);
  }

  setStatus(hitCount ? '✅ 完成：已命中可读函数' : '完成：未命中自定义函数，但标准余额已读最关键', hitCount ? 'ok' : 'err');
  document.getElementById('runBtn').disabled = false;
}
</script>
</body>
</html>
